<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Card</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: coral;
  font-family: Arial, sans-serif;
}

/* Card container */
.card {
  width: 300px;
  height: 400px;
  perspective: 1000px;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.8s;
  transform-style: preserve-3d;
}

.card:hover .card-inner {
  transform: rotateY(180deg);
}

/* Front & Back */
.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  backface-visibility: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.card-front {
  background: linear-gradient(purple, pink);
  color: white;
}

.card-back {
  background: lavender;
  transform: rotateY(180deg);
  padding: 20px;
  text-align: center;
}

h2 {
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="card">
  <div class="card-inner">
    
    <!-- Front -->
    <div class="card-front">
      <h2>Hover To Open</h2>
      🎂
    </div>

    <!-- Inside -->
    <div class="card-back">
      <h2>Happy Birthday Fasika!</h2>
  <img src="aa.JPG" alt="Birthday Photo" class="photo"width= 130px;  
 height=120px;  
  border-radius= 50%;
  object-fit=cover;

      <p>Your first digital birthday card!</p>
      <p>Developed Just For You.</p>
      <p>Enjoy and Have It A Blast! 🎉</p>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
confetti({
  particleCount= 150,
  spread= 70,
  origin= { y: 0.6 }
  });
  </script>
</body>
</html>
<button onclick="playMusic()">🎵 Play</button>

<audio id="bg-music">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
  document.getElementById("bg-music").play();
}
</script>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff7e5f, #feb47b);
  font-family: 'Segoe UI', sans-serif;
}

/* Card */
.card {
  background: #f3f3ff;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  animation: fadeIn 1.5s ease;
}

/* Title */
h2 {
  margin-bottom: 10px;
  color: #333;
}

/* Photo */
.photo {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  object-fit: cover;
  margin: 15px auto;
  display: block;
  border: 5px solid #ff69b4;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Text */
p {
  color: #444;
  margin: 10px 0;
}

/* Button */
.music-btn {
  padding: 10px 20px;
  background: #ff69b4;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  margin-top: 10px;
}

.music-btn:hover {
  background: #ff1493;
}

/* Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
<h2>Happy Birthday <span class="Fasika">Fasika</span>! 🎉</h2>
<h2>
  Happy Birthday 
  <span class="Fasika" onclick="showConfetti()">Fasika</span>! 🎉
</h2>
