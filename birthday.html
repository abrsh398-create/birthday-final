<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Card</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: coral;
  font-family: Arial, sans-serif;
}

/* Card container */
.card {
  width: 300px;
  height: 400px;
  perspective: 1000px;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.8s;
  transform-style: preserve-3d;
}

.card:hover .card-inner {
  transform: rotateY(180deg);
}

/* Front & Back */
.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  backface-visibility: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.gift-box {
  position: relative;
  width: 120px;
  height: 120px;
  margin: 20px auto;
  cursor: pointer;
}

.box {
  width: 100%;
  height: 100%;
  background: red;
  border-radius: 10px;
}

.lid {
  width: 100%;
  height: 40px;
  background: darkred;
  position: absolute;
  top: 0;
  left: 0;
  border-radius: 10px 10px 0 0;
  transition: transform 0.5s;
}

/* OPEN EFFECT */
.open .lid {
  transform: rotate(-40deg) translateY(-20px);
}
.card-front {
  background: linear-gradient(purple, pink);
  color: white;
}

.card-back {
  background: lavender;
  transform: rotateY(180deg);
  padding: 20px;
  text-align: center;
}

h2 {
  margin: 10px 0;
}
h2 {
  color: white;
  text-shadow: 0 0 10px pink, 0 0 20px purple, 0 0 30px hotpink;
}
</style>
</head>

<body>

<div class="card">
  <div class="card-inner">
    
    <!-- Front -->
    <div class="card-front">
      <h2>Hover To Open</h2>
      🎂
    </div>

    <!-- Inside -->
    <div class="card-back">
      <h2>Happy Birthday Fasika!</h2>
  <img src="aa.jpg" style="width:150px;height:150px;border-radius:50%;object-fit:cover;">


      <p>Happy Birthday!</p>
      <p>Developed Just For You.</p>
      <p>Enjoy and Have It A Blast! 🎉</p>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

  </script>
</body>
